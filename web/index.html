<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="智控" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="AI 智能体远程控制台 — 在浏览器中管理、观察和调度远程 AI Agent 任务。"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>智控 · AI 远程控制台</title>
    <style>
      html {
        background: radial-gradient(circle at top, #0f2d3a 0, #020617 34rem);
      }
      body {
        margin: 0;
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s ease-out;
      }
      #splash[hidden] {
        opacity: 0;
        pointer-events: none;
      }
      #splash .splash-brand {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        color: #67e8f9;
      }
      #splash .splash-icon {
        width: 56px;
        height: 56px;
        margin-top: 20px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <p class="splash-brand">智控 · AI 远程控制台</p>
      <img class="splash-icon" src="/icons/icon.svg" alt="" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
