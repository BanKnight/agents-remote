<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="智控" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="AI 智能体远程控制台 — 在浏览器中管理、观察和调度远程 AI Agent 任务。"
    />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>智控 · AI 远程控制台</title>
    <style>
      html {
        background: #020617;
      }
      body {
        min-height: 100dvh;
        margin: 0;
        background: radial-gradient(circle at top, #0f2d3a 0, #020617 34rem);
        background-attachment: fixed;
      }
    </style>
    <script>
      (function () {
        // Force-clear stale PWA caches — bump version to trigger full client reset.
        var CV = "v1";
        if (navigator.serviceWorker && !localStorage.getItem("ar-cv-" + CV)) {
          navigator.serviceWorker
            .getRegistrations()
            .then(function (regs) {
              return Promise.all(
                regs.map(function (r) {
                  return r.unregister();
                }),
              );
            })
            .then(function () {
              return caches.keys();
            })
            .then(function (ns) {
              return Promise.all(
                ns.map(function (n) {
                  return caches.delete(n);
                }),
              );
            })
            .then(function () {
              localStorage.setItem("ar-cv-" + CV, "1");
              location.reload();
            })
            .catch(function () {});
        }
      })();
    </script>
    <script>
      // Self-heal stale SW pointing at deleted chunk hashes.
      // After a rebuild, a cached SW may serve stale index.html referencing
      // /assets/index-XXXX.js chunks that no longer exist, causing white-screen.
      // Capture-phase 'error' listener catches resource 404s on script/link
      // tags. Recovery is gated by sessionStorage to prevent infinite loops.
      (function () {
        var KEY = "ar-chunk-recover";
        function recover() {
          try {
            if (sessionStorage.getItem(KEY) === "1") return;
            sessionStorage.setItem(KEY, "1");
          } catch (_) {}
          var unreg =
            navigator.serviceWorker && navigator.serviceWorker.getRegistrations
              ? navigator.serviceWorker.getRegistrations().then(function (rs) {
                  return Promise.all(
                    rs.map(function (r) {
                      return r.unregister();
                    }),
                  );
                })
              : Promise.resolve();
          unreg
            .then(function () {
              return "caches" in window
                ? caches.keys().then(function (ns) {
                    return Promise.all(
                      ns.map(function (n) {
                        return caches.delete(n);
                      }),
                    );
                  })
                : null;
            })
            .catch(function () {})
            .then(function () {
              var u = new URL(location.href);
              u.searchParams.set("_xr", Date.now());
              location.replace(u.toString());
            });
        }
        window.addEventListener(
          "error",
          function (e) {
            var t = e && e.target;
            if (!t || t === window) return;
            var src = t.src || t.href || "";
            if (typeof src !== "string") return;
            if (!/\/assets\/.+\.(js|css|mjs)(\?|$)/.test(src)) return;
            recover();
          },
          true,
        );
        window.addEventListener("unhandledrejection", function (e) {
          var msg = (e && e.reason && (e.reason.message || e.reason)) || "";
          msg = String(msg);
          if (
            /Failed to fetch dynamically imported module|error loading dynamically imported module|Importing a module script failed|is not a valid JavaScript MIME type|disallowed MIME type/i.test(
              msg,
            )
          ) {
            recover();
          }
        });
        window.addEventListener("load", function () {
          try {
            sessionStorage.removeItem(KEY);
          } catch (_) {}
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
