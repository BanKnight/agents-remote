<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="112" fill="#020617"/>
  <g transform="translate(256, 256)">
    <!-- Remote nodes — distributed dots around the perimeter -->
    <circle cx="0" cy="-156" r="10" fill="#38BDF8" opacity="0.35"/>
    <circle cx="135" cy="-78" r="10" fill="#38BDF8" opacity="0.35"/>
    <circle cx="-135" cy="-78" r="12" fill="#38BDF8" opacity="0.7"/>
    <circle cx="156" cy="0" r="8" fill="#38BDF8" opacity="0.25"/>
    <circle cx="-156" cy="0" r="10" fill="#38BDF8" opacity="0.45"/>
    <circle cx="135" cy="78" r="12" fill="#38BDF8" opacity="0.7"/>
    <circle cx="-135" cy="78" r="8" fill="#38BDF8" opacity="0.3"/>
    <circle cx="0" cy="156" r="10" fill="#38BDF8" opacity="0.4"/>
    <!-- Faint connection lines from remote nodes toward center -->
    <line x1="0" y1="-156" x2="0" y2="-90" stroke="#38BDF8" stroke-width="1.5" opacity="0.2"/>
    <line x1="135" y1="-78" x2="90" y2="-52" stroke="#38BDF8" stroke-width="1.5" opacity="0.2"/>
    <line x1="-135" y1="-78" x2="-90" y2="-52" stroke="#38BDF8" stroke-width="1.5" opacity="0.35"/>
    <line x1="135" y1="78" x2="90" y2="52" stroke="#38BDF8" stroke-width="1.5" opacity="0.35"/>
    <!-- Hexagon — AI core -->
    <polygon points="0,-68 60,-34 60,34 0,68 -60,34 -60,-34" fill="none" stroke="#38BDF8" stroke-width="10" stroke-linejoin="round"/>
    <!-- Inner circuit nodes -->
    <circle cx="0" cy="0" r="18" fill="#38BDF8"/>
    <circle cx="-22" cy="22" r="14" fill="#38BDF8"/>
    <circle cx="22" cy="22" r="14" fill="#38BDF8"/>
    <!-- Connections between nodes -->
    <line x1="0" y1="0" x2="-22" y2="22" stroke="#38BDF8" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="22" y2="22" stroke="#38BDF8" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
